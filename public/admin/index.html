<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Folks Team CMS</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f5f5f0;
        color: #262626;
      }

      .cms-status {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      .cms-status__card {
        width: min(100%, 560px);
        border: 1px solid #e5e5e5;
        border-radius: 16px;
        background: #fff;
        padding: 28px;
        box-shadow: 0 24px 60px rgb(15 23 42 / 10%);
      }

      .cms-status__eyebrow {
        margin: 0 0 10px;
        color: #ca8a04;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .cms-status h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 44px);
        line-height: 1.05;
      }

      .cms-status p {
        margin: 14px 0 0;
        color: #525252;
        line-height: 1.6;
      }

      .cms-status code {
        border-radius: 6px;
        background: #f4f4f5;
        padding: 2px 6px;
      }

      .cms-status__error {
        display: none;
        margin-top: 18px;
        border-radius: 12px;
        background: #fef2f2;
        color: #991b1b;
        padding: 14px;
        font-size: 14px;
      }

      .cms-status[data-error="true"] .cms-status__error {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="cms-status" id="cms-status">
      <div class="cms-status__card">
        <p class="cms-status__eyebrow">Folks Team CMS</p>
        <h1>Loading blog manager</h1>
        <p>
          The CMS is loading from Decap. If this screen stays here, the browser
          could not load the CMS script from the CDN.
        </p>
        <p>
          Config file:
          <code>/admin/config.yml</code>
        </p>
        <div class="cms-status__error" id="cms-error">
          Cannot load Decap CMS. Please check the internet connection or allow
          scripts from <code>cdn.jsdelivr.net</code> / <code>unpkg.com</code>.
        </div>
      </div>
    </div>

    <script>
      window.CMS_MANUAL_INIT = true;
      const statusEl = document.getElementById('cms-status');

      function showError() {
        if (statusEl) statusEl.dataset.error = 'true';
      }

      function loadScript(src, onError) {
        const script = document.createElement('script');
        script.src = src;
        script.onload = () => {
          if (window.CMS) {
            document.body.innerHTML = '';
            window.CMS.init();
          } else {
            onError();
          }
        };
        script.onerror = onError;
        document.body.appendChild(script);
      }

      loadScript(
        'https://cdn.jsdelivr.net/npm/decap-cms@3.8.3/dist/decap-cms.js',
        () => {
          loadScript(
            'https://unpkg.com/decap-cms@3.8.3/dist/decap-cms.js',
            showError
          );
        }
      );
    </script>
  </body>
</html>
