<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Admin | Folks Team</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=folks-official-1" />
    <link rel="icon" type="image/png" href="/favicon.png?v=folks-official-1" />
    <link rel="shortcut icon" href="/favicon.png?v=folks-official-1" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=folks-official-1" />
    <meta name="theme-color" content="#4fb16f" />
    <link rel="stylesheet" href="/admin/admin-ui.css?v=folks-admin-1" />
    <style>
      :root {
        --admin-surface: #ffffff;
        --admin-subtle: #f0faf3;
        --admin-subtle-2: #dcf4e4;
        --admin-line: #d7e6dc;
        --admin-ink: #272727;
        --admin-muted: #585858;
        --admin-danger: #b42318;
        --admin-warn: #a15c07;
        --admin-green: #327849;
      }

      body.admin-page {
        margin: 0;
      }

      .shell {
        max-width: 100%;
        margin: 0 auto;
        padding: 8px 8px 28px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 10px;
        margin-bottom: 12px;
        position: sticky;
        top: 8px;
        z-index: 60;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        color: inherit;
        text-decoration: none;
      }

      .brand h1 {
        margin: 0;
        font-size: 24px !important;
      }

      .eyebrow {
        margin: 0 0 2px;
      }

      .nav {
        display: flex;
        flex-wrap: nowrap;
        max-width: none;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .nav::-webkit-scrollbar {
        display: none;
      }

      .nav a,
      .nav button {
        flex: 0 0 auto;
      }

      .layout {
        display: block;
        min-width: 0;
        padding-left: 296px;
        position: relative;
      }

      .layout > aside.stack {
        position: fixed;
        top: 88px;
        left: 8px;
        width: 286px;
        max-height: calc(100vh - 102px);
        overflow-y: auto;
        scrollbar-width: thin;
        z-index: 20;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .surface {
        border: 1px solid var(--admin-line);
        border-radius: 8px;
        background: var(--admin-surface);
        box-shadow: var(--shadow);
        overflow: hidden;
        animation: adminFadeUp 0.44s ease both;
      }

      .surface-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--admin-line);
        padding: 11px 14px;
      }

      .surface-head h3 {
        margin: 0;
        font-size: 18px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .surface-head p {
        margin: 4px 0 0;
        color: var(--admin-muted);
        font-size: 12px;
        line-height: 1.32;
      }

      .priority-surface .surface-head {
        background: linear-gradient(135deg, #4fb16f, #327849);
        color: #ffffff;
        border-bottom: 0;
      }

      .priority-surface .surface-head h3,
      .priority-surface .surface-head p {
        color: #ffffff;
      }

      .priority-surface .surface-head p {
        opacity: 0.84;
      }

      .priority-surface .surface-head .button {
        border-color: rgba(255, 255, 255, 0.34) !important;
        background: rgba(255, 255, 255, 0.14) !important;
        color: #ffffff !important;
      }

      .priority-surface .surface-head h3,
      .priority-surface .surface-head p,
      .priority-surface .surface-head .button {
        animation: adminSlideIn 0.48s ease both;
      }

      .priority-surface .surface-head p {
        animation-delay: 0.05s;
      }

      .priority-surface .surface-head .button {
        animation-delay: 0.1s;
      }

      .priority-board {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(260px, 0.78fr);
        gap: 10px;
        padding: 12px;
      }

      .focus-panel {
        min-width: 0;
        border-radius: 8px;
        background: var(--admin-subtle);
        border: 1px solid #cfead6;
        padding: 13px;
        animation:
          adminSlideIn 0.5s ease both,
          adminSoftGlow 3.8s ease-in-out infinite;
      }

      .focus-panel.clean {
        background: var(--admin-subtle);
        border-color: #cfead6;
      }

      .focus-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
      }

      .focus-top h3 {
        margin: 0;
        font-size: 20px;
      }

      .focus-number {
        display: inline-grid;
        place-items: center;
        flex: 0 0 auto;
        min-width: 46px;
        height: 38px;
        border: 1px solid #bde8cb;
        border-radius: 12px;
        background: #ffffff;
        color: var(--admin-green);
        box-shadow: inset 0 0 0 4px rgb(79 177 111 / 6%);
        padding: 0 9px;
        font-size: 18px;
        font-weight: 950;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        text-align: right;
        animation: adminCountPulse 3s ease-in-out infinite;
      }

      .focus-note {
        margin: 8px 0 0;
        color: var(--admin-muted);
        font-size: 13px;
        line-height: 1.38;
      }

      .focus-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .kpi {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        column-gap: 10px;
        align-items: start;
        min-width: 0;
        border: 1px solid var(--admin-line);
        border-radius: 8px;
        background: var(--admin-subtle);
        padding: 10px;
        animation: adminSlideIn 0.5s ease both;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          border-color 0.18s ease;
      }

      .kpi:nth-child(2) {
        animation-delay: 0.04s;
      }

      .kpi:nth-child(3) {
        animation-delay: 0.08s;
      }

      .kpi:nth-child(4) {
        animation-delay: 0.12s;
      }

      .kpi:hover {
        transform: translateY(-2px);
        border-color: #bde8cb;
        box-shadow: 0 12px 28px rgb(38 38 38 / 10%);
      }

      .kpi.warn {
        border-color: #f8d999;
        background: #fffbeb;
      }

      .kpi.danger {
        border-color: #ffd6d1;
        background: #fff7f7;
      }

      .kpi-label {
        color: var(--admin-muted);
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .kpi-value {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        min-width: 46px;
        min-height: 38px;
        justify-self: end;
        grid-row: span 2;
        border: 1px solid #bde8cb;
        border-radius: 12px;
        background: #ffffff;
        color: var(--admin-ink);
        padding: 0 9px;
        font-size: 18px;
        font-weight: 950;
        line-height: 1;
        text-align: right;
        overflow-wrap: anywhere;
        font-variant-numeric: tabular-nums;
        animation: adminCountPulse 3s ease-in-out infinite;
      }

      .kpi-note {
        margin: 5px 0 0;
        color: var(--admin-muted);
        font-size: 12px;
        line-height: 1.32;
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 10px;
        padding: 12px;
      }

      .metric-panel {
        min-width: 0;
        grid-column: span 3;
        border: 1px solid var(--admin-line);
        border-radius: 8px;
        background: #ffffff;
        overflow: hidden;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          border-color 0.18s ease;
      }

      .metric-panel.wide {
        grid-column: span 3;
        background: var(--admin-subtle);
      }

      .metric-panel:hover {
        transform: translateY(-2px);
        border-color: #bde8cb;
        box-shadow: 0 16px 32px rgb(38 38 38 / 10%);
      }

      .metric-main {
        display: grid;
        gap: 8px;
        border-bottom: 0;
        background: linear-gradient(135deg, #4fb16f, #327849);
        padding: 12px;
        color: #ffffff;
        text-decoration: none;
      }

      .metric-stat {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .metric-title {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .metric-title h4 {
        margin: 0;
        color: #ffffff;
        font-size: 18px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .metric-value {
        display: inline-grid;
        place-items: center;
        order: 2;
        min-width: 46px;
        height: 38px;
        border: 1px solid rgba(255, 255, 255, 0.36);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.14);
        color: #ffffff;
        padding: 0 9px;
        font-size: 18px;
        font-weight: 950;
        line-height: 1;
        text-align: right;
        font-variant-numeric: tabular-nums;
        box-shadow: inset 0 0 0 4px rgb(255 255 255 / 6%);
        animation: adminMetricPulse 3s ease-in-out infinite;
      }

      .metric-caption {
        order: 1;
        color: rgba(255, 255, 255, 0.86);
        font-size: 12px;
        line-height: 1.32;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        border: 1px solid #cfead6;
        border-radius: 999px;
        background: #edf8f1;
        color: var(--admin-green);
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 900;
        white-space: nowrap;
      }

      .metric-main .pill {
        border-color: rgba(255, 255, 255, 0.36);
        background: rgba(255, 255, 255, 0.16);
        color: #ffffff;
      }

      .pill.warn {
        border-color: #f8d999;
        background: #fffbeb;
        color: var(--admin-warn);
      }

      .pill.danger {
        border-color: #ffd6d1;
        background: #fff7f7;
        color: var(--admin-danger);
      }

      .detail-list {
        display: grid;
      }

      .detail-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        border-bottom: 1px solid #edf0ea;
        padding: 9px 12px;
        text-decoration: none;
        transition:
          background 0.18s ease,
          transform 0.18s ease;
      }

      .detail-row:last-child {
        border-bottom: 0;
      }

      .detail-row:hover {
        background: #f8faf7;
        transform: translateX(2px);
      }

      .detail-row strong {
        color: var(--admin-ink);
        font-size: 13px;
      }

      .detail-row p {
        margin: 3px 0 0;
        color: var(--admin-muted);
        font-size: 12px;
        line-height: 1.3;
      }

      .detail-value {
        max-width: 180px;
        color: var(--admin-ink);
        font-size: 15px;
        font-weight: 950;
        text-align: right;
        overflow-wrap: anywhere;
        font-variant-numeric: tabular-nums;
      }

      .metric-panel.wide .detail-value {
        max-width: 360px;
      }

      .tool-map {
        display: grid;
        gap: 8px;
        padding: 10px;
      }

      .tool-group {
        border: 1px solid var(--admin-line);
        border-radius: 8px;
        background: #f8faf7;
        overflow: hidden;
        animation: adminFadeUp 0.42s ease both;
      }

      .tool-head {
        display: grid;
        background: linear-gradient(135deg, #4fb16f, #327849);
        color: #ffffff;
        padding: 10px 11px;
        text-decoration: none;
        transition:
          transform 0.18s ease,
          background 0.18s ease;
      }

      .tool-head:hover {
        background: linear-gradient(135deg, #3f965c, #2a603d);
        transform: translateY(-1px);
      }

      .tool-head h4 {
        margin: 0;
        color: #ffffff;
        font-size: 15px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .tool-list {
        display: grid;
      }

      .tool-link {
        display: grid;
        gap: 3px;
        border-bottom: 1px solid #edf0ea;
        padding: 8px 10px;
        text-decoration: none;
        transition:
          background 0.18s ease,
          transform 0.18s ease;
      }

      .tool-link:last-child {
        border-bottom: 0;
      }

      .tool-link:hover {
        background: #fbfdfb;
        transform: translateX(2px);
      }

      .tool-link strong {
        color: var(--admin-ink);
        font-size: 13px;
      }

      .tool-link span {
        display: block;
        color: var(--admin-muted);
        font-size: 12px;
        line-height: 1.28;
      }

      .empty-state {
        border: 1px solid #f8d999;
        border-radius: 8px;
        background: #fffbeb;
        color: #854d0e;
        padding: 13px 14px;
        font-size: 13px;
        font-weight: 850;
        animation: adminSlideIn 0.48s ease both;
      }

      .heading-icon {
        display: inline-grid;
        place-items: center;
        width: 20px;
        height: 20px;
        color: currentColor;
        line-height: 1;
      }

      .heading-icon svg {
        width: 19px;
        height: 19px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        display: block;
      }

      .surface-head .heading-icon {
        color: var(--admin-green);
      }

      .priority-surface .surface-head .heading-icon,
      .metric-main .heading-icon,
      .tool-head .heading-icon {
        color: currentColor;
      }

      .mini-action {
        min-height: 34px !important;
        padding: 7px 10px !important;
        font-size: 12px !important;
      }

      @keyframes adminFadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes adminSlideIn {
        from {
          opacity: 0;
          transform: translateX(12px);
        }

        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes adminCountPulse {
        0%,
        100% {
          box-shadow:
            inset 0 0 0 4px rgb(79 177 111 / 6%),
            0 0 0 0 rgb(79 177 111 / 0%);
        }

        50% {
          box-shadow:
            inset 0 0 0 4px rgb(79 177 111 / 10%),
            0 0 0 3px rgb(79 177 111 / 7%);
        }
      }

      @keyframes adminSoftGlow {
        0%,
        100% {
          border-color: #cfead6;
        }

        50% {
          border-color: #9fdcb2;
        }
      }

      @keyframes adminMetricPulse {
        0%,
        100% {
          box-shadow:
            inset 0 0 0 4px rgb(255 255 255 / 6%),
            0 0 0 0 rgb(255 255 255 / 0%);
        }

        50% {
          box-shadow:
            inset 0 0 0 4px rgb(255 255 255 / 10%),
            0 0 0 3px rgb(255 255 255 / 7%);
        }
      }

      .sidebar-footer {
        border: 1px solid var(--admin-line);
        border-radius: 8px;
        background: rgb(255 255 255 / 90%);
        box-shadow: var(--shadow);
        padding: 10px;
        display: grid;
        gap: 8px;
        animation: adminFadeUp 0.44s ease both;
      }

      .sidebar-footer p {
        margin: 0;
        color: var(--admin-muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .sidebar-tools {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .sidebar-chip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 34px;
        border: 1px solid var(--admin-line);
        border-radius: 8px;
        background: #ffffff;
        color: var(--admin-ink);
        padding: 7px 9px;
        font-size: 12px;
        font-weight: 850;
      }

      body[data-theme='dark'] {
        --paper: #111611;
        --panel: #1f2521;
        --brand-soft: #26352a;
        --line: #39513f;
        --ink: #f5f7f2;
        --muted: #c4ccbf;
        --soft: #aeb8ad;
        --shadow: 0 18px 44px rgb(0 0 0 / 28%);
        --admin-surface: #1f2521;
        --admin-subtle: #26352a;
        --admin-subtle-2: #2f5239;
        --admin-line: #39513f;
        --admin-ink: #f5f7f2;
        --admin-muted: #c4ccbf;
        background: #111611 !important;
        color: var(--admin-ink);
      }

      body[data-theme='dark'] .surface,
      body[data-theme='dark'] .sidebar-footer,
      body[data-theme='dark'] .tool-group,
      body[data-theme='dark'] .sidebar-chip,
      body[data-theme='dark'] .metric-panel {
        background: var(--admin-surface) !important;
      }

      body[data-theme='dark'] .topbar {
        background: rgb(31 37 33 / 94%) !important;
        border-color: var(--admin-line) !important;
        color: var(--admin-ink);
      }

      body[data-theme='dark'] .nav a,
      body[data-theme='dark'] .nav button,
      body[data-theme='dark'] .button.secondary,
      body[data-theme='dark'] .mini-action,
      body[data-theme='dark'] .sidebar-chip {
        background: #172018 !important;
        border-color: var(--admin-line) !important;
        color: var(--admin-ink) !important;
      }

      body[data-theme='dark'] .nav a[aria-current='page'],
      body[data-theme='dark'] .button:not(.secondary),
      body[data-theme='dark'] .utility-action {
        background: #4fb16f !important;
        border-color: #5bc982 !important;
        color: #ffffff !important;
      }

      body[data-theme='dark'] .surface:not(.priority-surface) .surface-head {
        background: var(--admin-surface) !important;
        border-color: var(--admin-line) !important;
      }

      body[data-theme='dark'] .priority-board {
        background: var(--admin-surface) !important;
      }

      body[data-theme='dark'] .focus-panel,
      body[data-theme='dark'] .focus-panel.clean,
      body[data-theme='dark'] .kpi,
      body[data-theme='dark'] .empty-state {
        background: var(--admin-subtle) !important;
        border-color: var(--admin-line) !important;
        color: var(--admin-ink) !important;
      }

      body[data-theme='dark'] .kpi.warn,
      body[data-theme='dark'] .kpi.danger {
        background: #253427 !important;
        border-color: #5d7b4f !important;
      }

      body[data-theme='dark'] .focus-number,
      body[data-theme='dark'] .kpi-value {
        background: #111611 !important;
        border-color: #5d7b4f !important;
        color: #f5f7f2 !important;
      }

      body[data-theme='dark'] .pill,
      body[data-theme='dark'] .pill.warn,
      body[data-theme='dark'] .pill.danger {
        background: #172018 !important;
        border-color: var(--admin-line) !important;
        color: var(--admin-ink) !important;
      }

      body[data-theme='dark'] .detail-row,
      body[data-theme='dark'] .tool-link {
        border-color: var(--admin-line) !important;
      }

      body[data-theme='dark'] .detail-row:hover,
      body[data-theme='dark'] .tool-link:hover {
        background: #26352a;
      }

      @media (max-width: 980px) {
        .layout,
        .priority-board {
          grid-template-columns: 1fr;
        }

        .layout {
          display: grid;
          padding-left: 0;
        }

        .layout > aside.stack {
          position: static;
          width: auto;
          max-height: none;
          overflow: visible;
        }

        .sidebar-footer {
          display: flex;
          justify-content: space-between;
          align-items: center;
        }
      }

      @media (max-width: 720px) {
        .surface-head {
          align-items: stretch;
          flex-direction: column;
        }

        .nav {
          width: 100%;
        }

        .shell {
          padding-right: 4px;
          padding-left: 4px;
        }

        .kpi-grid,
        .dashboard-grid {
          grid-template-columns: 1fr;
        }

        .metric-panel,
        .metric-panel.wide {
          grid-column: auto;
        }

        .focus-number {
          min-width: 46px;
          height: 38px;
          border-radius: 12px;
          font-size: 18px;
        }

        .tool-head {
          grid-template-columns: 1fr;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body class="admin-page admin-home">
    <main class="shell" id="top">
      <header class="topbar">
        <a class="brand" href="#top" aria-label="Về đầu trang Admin">
          <img class="mark" src="/folks-brand-mark.jpg" alt="Folks Team logo" />
          <div>
            <p class="eyebrow">Folks Team</p>
            <h1>Admin</h1>
          </div>
        </a>
        <nav class="nav" aria-label="Admin">
          <a href="/admin/" aria-current="page">Trang Chủ Admin</a>
          <a class="secondary" href="/admin/content.html">Sửa trang</a>
          <a class="secondary" href="/admin/blog.html">Viết blog</a>
          <a class="secondary" href="/admin/leads.html">Lead</a>
          <a class="secondary" href="/admin/operations.html">Vận hành</a>
          <button type="button" class="button secondary" data-admin-logout>
            Đăng xuất
          </button>
        </nav>
      </header>

      <div class="layout">
        <aside class="stack" aria-label="Công cụ Admin">
          <section class="surface">
            <div id="tool-map" class="tool-map"></div>
          </section>
          <footer class="sidebar-footer" aria-label="Thông tin Admin">
            <p>© Folks Team 2026</p>
            <div class="sidebar-tools">
              <span class="sidebar-chip" aria-label="Ngôn ngữ hiện tại">
                <span class="heading-icon" aria-hidden="true" data-icon="language"></span>VI
              </span>
              <button type="button" class="sidebar-chip" id="theme-toggle" aria-pressed="false">
                <span class="heading-icon" aria-hidden="true" data-icon="moon"></span>Theme
              </button>
            </div>
          </footer>
        </aside>

        <div class="stack">
          <section class="surface priority-surface" aria-labelledby="priority-title">
            <div class="surface-head">
              <div>
                <h3 id="priority-title"><span class="heading-icon" aria-hidden="true" data-icon="spark"></span>Cập nhật đáng chú ý</h3>
                <p id="dashboard-status">Đang tải dữ liệu mới nhất...</p>
              </div>
              <button type="button" class="button secondary mini-action" id="refresh-dashboard">
                Tải lại dữ liệu
              </button>
            </div>
            <div id="priority-board" class="priority-board" aria-live="polite">
              <div class="empty-state">Đang tải việc cần chú ý...</div>
            </div>
          </section>

          <section class="surface" aria-labelledby="dashboard-title">
            <div class="surface-head">
              <div>
                <h3 id="dashboard-title"><span class="heading-icon" aria-hidden="true" data-icon="bar-chart"></span>Dashboard vận hành</h3>
              </div>
            </div>
            <div id="dashboard-grid" class="dashboard-grid">
              <div class="empty-state">Đang tải dashboard...</div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="/admin/admin-session.js"></script>
    <script>
      const dashboardStatus = document.getElementById('dashboard-status');
      const priorityBoard = document.getElementById('priority-board');
      const dashboardGrid = document.getElementById('dashboard-grid');
      const toolMap = document.getElementById('tool-map');

      const toolGroups = [
        {
          group: 'Khách hàng',
          icon: 'users',
          primaryHref: '/admin/leads.html',
          items: [
            ['Lead', 'Xử lý khách liên hệ qua form.', '/admin/leads.html'],
            ['Email đăng ký', 'Danh sách người muốn nhận tin (newsletter).', '/admin/operations.html#subscribers'],
          ],
        },
        {
          group: 'Nội dung website',
          icon: 'file-edit',
          primaryHref: '/admin/content.html',
          items: [
            ['Sửa trang', 'Cập nhật chữ, ảnh, khối nội dung.', '/admin/content.html'],
            ['Viết blog', 'Tạo nháp, kiểm tra và đăng bài.', '/admin/blog.html'],
            ['Sửa chữ hàng loạt', 'Tìm và thay một cụm từ.', '/admin/text.html'],
          ],
        },
        {
          group: 'Vận hành & Quản Trị',
          icon: 'shield-check',
          primaryHref: '/admin/operations.html',
          items: [
            ['Duyệt nội dung', 'Các mục đang chờ kiểm tra.', '/admin/operations.html#review'],
            ['Hiển thị Google (SEO)', 'Tiêu đề, mô tả và alt ảnh.', '/admin/operations.html#seo'],
            ['Thư viện ảnh', 'Tải ảnh và lấy đường dẫn.', '/admin/operations.html#media'],
            ['Lịch sử thao tác', 'Ai đã đổi gì và khi nào.', '/admin/operations.html#audit'],
          ],
        },
        {
          group: 'Kỹ thuật & hỗ trợ',
          icon: 'settings',
          primaryHref: '/admin/console.html',
          items: [
            ['Kỹ thuật', 'Kiểm tra cấu hình và deploy.', '/admin/console.html'],
            ['Hướng dẫn', 'Cách dùng hệ thống admin.', '/admin/guide.html'],
          ],
        },
      ];

      function escapeHtml(value) {
        return String(value || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function compactDate(value) {
        if (!value) return 'Chưa có';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return date.toLocaleString('vi-VN', {
          dateStyle: 'short',
          timeStyle: 'short',
        });
      }

      function numberText(value) {
        const number = Number(value || 0);
        return Number.isFinite(number) ? number.toLocaleString('vi-VN') : '-';
      }

      function levelClass(level) {
        if (level === 'danger') return 'danger';
        if (level === 'warn') return 'warn';
        return '';
      }

      function iconSvg(name) {
        const icons = {
          users: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
          'file-edit': '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M14 2v6h6"/><path d="M16 13l5-5 2 2-5 5-3 1 1-3z"/></svg>',
          'shield-check': '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>',
          settings: '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-.4-1 1.7 1.7 0 0 0-1-.6 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1-.4H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1-.4 1.7 1.7 0 0 0 .6-1 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 .4 1 1.7 1.7 0 0 0 1 .6 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.2.34.4.65.6 1h1a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1 .4 1.7 1.7 0 0 0-.6 1z"/></svg>',
          spark: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13 2 9 10l-7 3 7 3 4 8 4-8 7-3-7-3-4-8z"/><path d="M5 3v4"/><path d="M3 5h4"/></svg>',
          'bar-chart': '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3v18h18"/><path d="M8 17V9"/><path d="M13 17V5"/><path d="M18 17v-6"/></svg>',
          language: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h10"/><path d="M9 3v2"/><path d="M5 9c1.2 3 3.5 5 7 6"/><path d="M12 9c-.8 2.2-2.5 4.1-5 6"/><path d="M14 21l5-10 3 10"/><path d="M16 17h5"/></svg>',
          moon: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>',
        };
        return icons[name] || icons.settings;
      }

      function detailRow(item) {
        return `
          <a class="detail-row" href="${escapeHtml(item.href)}">
            <div>
              <strong>${escapeHtml(item.label)}</strong>
              <p>${escapeHtml(item.note)}</p>
            </div>
            <span class="detail-value">${escapeHtml(item.value)}</span>
          </a>
        `;
      }

      function metricPanel(item) {
        return `
          <article class="metric-panel ${escapeHtml(item.wide ? 'wide' : '')}">
            <a class="metric-main" href="${escapeHtml(item.href)}">
              <div class="metric-title">
                <h4><span class="heading-icon" aria-hidden="true">${iconSvg(item.icon)}</span>${escapeHtml(item.title)}</h4>
                <span class="pill ${levelClass(item.level)}">${escapeHtml(item.status)}</span>
              </div>
              <div class="metric-stat">
                <div class="metric-value">${escapeHtml(item.value)}</div>
                <div class="metric-caption">${escapeHtml(item.caption)}</div>
              </div>
            </a>
            <div class="detail-list">
              ${item.details.map(detailRow).join('')}
            </div>
          </article>
        `;
      }

      function kpiCard(item) {
        return `
          <a class="kpi ${levelClass(item.level)}" href="${escapeHtml(item.href)}">
            <span class="kpi-label">${escapeHtml(item.label)}</span>
            <strong class="kpi-value">${escapeHtml(item.value)}</strong>
            <p class="kpi-note">${escapeHtml(item.note)}</p>
          </a>
        `;
      }

      function priorityBoardMarkup(data) {
        const metrics = data.metrics || {};
        const latest = data.latest || {};
        const urgent = Number(metrics.staleNewLeads || 0);
        const focusClean = urgent ? '' : 'clean';
        return `
          <article class="focus-panel ${focusClean}">
            <div class="focus-top">
              <div>
                <p class="eyebrow">${urgent ? 'Ưu tiên hôm nay' : 'Tình hình hôm nay'}</p>
                <h3>${urgent ? 'Trả lời lead quá hạn' : 'Không có việc quá hạn'}</h3>
              </div>
              <strong class="focus-number">${numberText(urgent)}</strong>
            </div>
            <p class="focus-note">
              ${
                urgent
                  ? 'Lead quá 24 giờ nên được xử lý trước các việc nội dung để tránh mất khách.'
                  : 'Không có lead quá hạn. Có thể kiểm tra nội dung chờ duyệt hoặc cập nhật website.'
              }
            </p>
            <div class="focus-actions">
              <a class="button" href="/admin/leads.html">Mở Lead</a>
              <a class="button secondary" href="/admin/operations.html#review">Mở mục cần review</a>
            </div>
          </article>
          <div class="kpi-grid">
            ${[
              {
                label: 'Lead mới',
                value: numberText(metrics.newLeads),
                note: 'khách mới cần phân loại.',
                level: metrics.newLeads ? 'warn' : '',
                href: '/admin/leads.html',
              },
              {
                label: 'Chờ duyệt',
                value: numberText(metrics.pendingReviews),
                note: 'mục cần kiểm tra trước khi đăng.',
                level: metrics.pendingReviews ? 'warn' : '',
                href: '/admin/operations.html#review',
              },
              {
                label: 'Email đăng ký',
                value: numberText(metrics.subscribers),
                note: 'tổng email đăng ký.',
                level: '',
                href: '/admin/operations.html#subscribers',
              },
              {
                label: 'Cập nhật',
                value: compactDate(latest.auditAt || data.updatedAt),
                note: 'lần ghi nhận gần nhất.',
                level: '',
                href: '/admin/operations.html#audit',
              },
            ]
              .map(kpiCard)
              .join('')}
          </div>
        `;
      }

      function dashboardPanels(data) {
        const metrics = data.metrics || {};
        const contentCounts = data.contentCounts || {};
        const latest = data.latest || {};
        const leadStatus = data.leadStatus || {};
        const subscriberStatus = data.subscriberStatus || {};
        return [
          {
            title: 'Khách hàng',
            icon: 'users',
            href: '/admin/leads.html',
            value: numberText(metrics.newLeads),
            caption: 'lead mới cần nhìn trước',
            status: metrics.staleNewLeads ? 'Ưu tiên' : metrics.newLeads ? 'Cần xem' : 'Ổn',
            level: metrics.staleNewLeads ? 'danger' : metrics.newLeads ? 'warn' : '',
            details: [
              { label: 'Quá 24 giờ', value: numberText(metrics.staleNewLeads), note: 'Nên trả lời trước.', href: '/admin/leads.html?status=new' },
              { label: 'Đang xử lý', value: numberText(metrics.workingLeads), note: 'Lead đã có người theo dõi.', href: '/admin/leads.html?status=working' },
              { label: 'Tổng lead', value: numberText(metrics.leads), note: `Mới nhất: ${compactDate(latest.leadAt)}.`, href: '/admin/leads.html' },
              {
                label: 'Trạng thái khác',
                value: numberText(
                  Object.values(leadStatus).reduce((sum, value) => sum + Number(value || 0), 0) -
                    Number(metrics.newLeads || 0) -
                    Number(metrics.workingLeads || 0)
                ),
                note: 'Đã đóng, đã phân loại hoặc trạng thái riêng.',
                href: '/admin/leads.html',
              },
            ],
          },
          {
            title: 'Nội dung & Quản Trị',
            icon: 'file-edit',
            href: '/admin/content.html',
            value: numberText(metrics.contentItems),
            caption: 'mục nội dung chính trên website',
            status: metrics.pendingReviews ? 'Có review' : 'Theo dõi',
            level: metrics.pendingReviews ? 'warn' : '',
            details: [
              { label: 'Blog', value: numberText(contentCounts.blog), note: 'Bài viết đang có.', href: '/admin/blog.html' },
              { label: 'Sản phẩm', value: numberText(contentCounts.products), note: 'Sản phẩm hoặc chương trình.', href: '/admin/content.html#products' },
              { label: 'Insight', value: numberText(contentCounts.insights), note: 'Nội dung phân tích.', href: '/admin/content.html#insights' },
              { label: 'Chờ duyệt', value: numberText(metrics.pendingReviews), note: 'Cần kiểm tra trước khi public.', href: '/admin/operations.html#review' },
              { label: 'Ảnh website', value: numberText(metrics.mediaItems), note: 'Tài nguyên trong thư viện.', href: '/admin/operations.html#media' },
            ],
          },
          {
            title: 'Cộng đồng',
            icon: 'users',
            href: '/admin/operations.html#subscribers',
            value: numberText(metrics.subscribers),
            caption: 'email đăng ký nhận tin',
            status: 'Theo dõi',
            level: '',
            details: [
              { label: 'Đang hoạt động', value: numberText(subscriberStatus.active || metrics.subscribers), note: 'Active hoặc chưa phân loại.', href: '/admin/operations.html#subscribers' },
              {
                label: 'Trạng thái khác',
                value: numberText(
                  Object.entries(subscriberStatus)
                    .filter(([key]) => key !== 'active')
                    .reduce((sum, [, value]) => sum + Number(value || 0), 0)
                ),
                note: 'Các trạng thái phụ nếu có.',
                href: '/admin/operations.html#subscribers',
              },
            ],
          },
          {
            title: 'Dashboard Hệ Thống',
            icon: 'shield-check',
            href: '/admin/operations.html#audit',
            value: numberText(metrics.auditEvents),
            caption: 'số lần cập nhật website đã được ghi nhận',
            status: 'Có lịch sử',
            level: '',
            details: [
              { label: 'Lịch sử mới nhất', value: compactDate(latest.auditAt), note: 'Lần chỉnh sửa website gần nhất', href: '/admin/operations.html#audit' },
              { label: 'Trang admin', value: numberText(contentCounts.adminPages), note: 'Số file công cụ trong khu Admin.', href: '/admin/' },
              { label: 'Nơi lưu dữ liệu', value: data.repo || 'Chưa rõ', note: 'Repository đang dùng.', href: '/admin/console.html' },
              { label: 'Nhánh', value: data.branch || 'Chưa rõ', note: 'Nhánh đang đọc và ghi dữ liệu.', href: '/admin/console.html' },
            ],
          },
        ];
      }

      function toolGroupMarkup(group) {
        return `
          <article class="tool-group">
            <a class="tool-head" href="${escapeHtml(group.primaryHref)}">
              <h4><span class="heading-icon" aria-hidden="true">${iconSvg(group.icon)}</span>${escapeHtml(group.group)}</h4>
            </a>
            <div class="tool-list">
              ${group.items
                .map(
                  item => `
                    <a class="tool-link" href="${escapeHtml(item[2])}">
                      <strong>${escapeHtml(item[0])}</strong>
                      <span>${escapeHtml(item[1])}</span>
                    </a>
                  `
                )
                .join('')}
            </div>
          </article>
        `;
      }

      async function loadDashboard() {
        dashboardStatus.textContent = 'Đang tải dữ liệu mới nhất...';
        priorityBoard.innerHTML = '<div class="empty-state">Đang tải việc cần chú ý...</div>';
        dashboardGrid.innerHTML = '<div class="empty-state">Đang tải dashboard...</div>';

        try {
          const response = await fetch('/api/admin-operations?module=dashboard', {
            credentials: 'same-origin',
            cache: 'no-store',
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok || data.ok === false) {
            throw new Error(data.message || `Không tải được dashboard (${response.status}).`);
          }

          dashboardStatus.textContent = `Cập nhật: ${compactDate(data.updatedAt)}`;
          priorityBoard.innerHTML = priorityBoardMarkup(data);
          dashboardGrid.innerHTML = dashboardPanels(data).map(metricPanel).join('');
        } catch (error) {
          dashboardStatus.textContent =
            error instanceof Error ? error.message : 'Không tải được dashboard.';
          priorityBoard.innerHTML = `
            <div class="empty-state">
              Không tải được dữ liệu. Hãy đăng nhập lại hoặc mở Vận hành để kiểm tra.
            </div>
          `;
          dashboardGrid.innerHTML = '';
        }
      }

      document.querySelectorAll('[data-icon]').forEach(icon => {
        icon.innerHTML = iconSvg(icon.dataset.icon);
      });

      const themeToggle = document.getElementById('theme-toggle');
      const storedTheme = localStorage.getItem('folks-admin-theme') || '';
      if (storedTheme === 'dark') {
        document.body.dataset.theme = 'dark';
        themeToggle?.setAttribute('aria-pressed', 'true');
      }
      themeToggle?.addEventListener('click', () => {
        const dark = document.body.dataset.theme !== 'dark';
        document.body.dataset.theme = dark ? 'dark' : '';
        localStorage.setItem('folks-admin-theme', dark ? 'dark' : 'light');
        themeToggle.setAttribute('aria-pressed', String(dark));
      });

      toolMap.innerHTML = toolGroups.map(toolGroupMarkup).join('');
      document.getElementById('refresh-dashboard')?.addEventListener('click', loadDashboard);
      loadDashboard();
    </script>
  </body>
</html>
