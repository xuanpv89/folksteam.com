<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Admin | Folks Team</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=folks-official-1" />
    <link rel="icon" type="image/png" href="/favicon.png?v=folks-official-1" />
    <link rel="shortcut icon" href="/favicon.png?v=folks-official-1" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=folks-official-1" />
    <meta name="theme-color" content="#4fb16f" />
    <link rel="stylesheet" href="/admin/admin-ui.css?v=folks-admin-1" />
    <style>
      :root {
        --admin-surface: #ffffff;
        --admin-subtle: #f0faf3;
        --admin-subtle-2: #dcf4e4;
        --admin-line: #d7e6dc;
        --admin-ink: #272727;
        --admin-muted: #585858;
        --admin-danger: #b42318;
        --admin-warn: #a15c07;
        --admin-green: #327849;
      }

      .shell {
        max-width: 1220px;
        margin: 0 auto;
        padding: 16px 16px 38px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 10px;
        margin-bottom: 12px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .brand h1 {
        margin: 0;
        font-size: 24px !important;
      }

      .eyebrow {
        margin: 0 0 2px;
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(320px, 0.86fr) minmax(0, 1.5fr);
        gap: 12px;
        align-items: start;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .surface {
        border: 1px solid var(--admin-line);
        border-radius: 8px;
        background: var(--admin-surface);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .surface-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--admin-line);
        padding: 11px 14px;
      }

      .surface-head h3 {
        margin: 0;
        font-size: 18px;
      }

      .surface-head p {
        margin: 4px 0 0;
        color: var(--admin-muted);
        font-size: 12px;
        line-height: 1.32;
      }

      .priority-board {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(260px, 0.78fr);
        gap: 10px;
        padding: 12px;
      }

      .focus-panel {
        min-width: 0;
        border-radius: 8px;
        background: linear-gradient(180deg, #fff7f7, #ffffff);
        border: 1px solid #ffd6d1;
        padding: 13px;
      }

      .focus-panel.clean {
        background: linear-gradient(180deg, #f3fbf5, #ffffff);
        border-color: #cfead6;
      }

      .focus-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
      }

      .focus-top h3 {
        margin: 0;
        font-size: 20px;
      }

      .focus-number {
        font-size: 46px;
        font-weight: 950;
        line-height: 0.95;
        font-variant-numeric: tabular-nums;
      }

      .focus-note {
        margin: 8px 0 0;
        color: var(--admin-muted);
        font-size: 13px;
        line-height: 1.38;
      }

      .focus-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .kpi {
        min-width: 0;
        border: 1px solid var(--admin-line);
        border-radius: 8px;
        background: var(--admin-subtle);
        padding: 10px;
      }

      .kpi.warn {
        border-color: #f8d999;
        background: #fffbeb;
      }

      .kpi.danger {
        border-color: #ffd6d1;
        background: #fff7f7;
      }

      .kpi-label {
        color: var(--admin-muted);
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .kpi-value {
        display: block;
        margin-top: 5px;
        color: var(--admin-ink);
        font-size: 26px;
        font-weight: 950;
        line-height: 1;
        overflow-wrap: anywhere;
      }

      .kpi-note {
        margin: 5px 0 0;
        color: var(--admin-muted);
        font-size: 12px;
        line-height: 1.32;
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 10px;
        padding: 12px;
      }

      .metric-panel {
        min-width: 0;
        grid-column: span 3;
        border: 1px solid var(--admin-line);
        border-radius: 8px;
        background: #ffffff;
        overflow: hidden;
      }

      .metric-panel.wide {
        grid-column: span 6;
        background: var(--admin-subtle);
      }

      .metric-main {
        display: grid;
        gap: 8px;
        border-bottom: 1px solid #edf0ea;
        padding: 12px;
      }

      .metric-title {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .metric-title h4 {
        margin: 0;
        color: var(--admin-ink);
        font-size: 18px;
      }

      .metric-value {
        color: var(--admin-ink);
        font-size: 31px;
        font-weight: 950;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }

      .metric-caption {
        color: var(--admin-muted);
        font-size: 12px;
        line-height: 1.32;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        border: 1px solid #cfead6;
        border-radius: 999px;
        background: #edf8f1;
        color: var(--admin-green);
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 900;
        white-space: nowrap;
      }

      .pill.warn {
        border-color: #f8d999;
        background: #fffbeb;
        color: var(--admin-warn);
      }

      .pill.danger {
        border-color: #ffd6d1;
        background: #fff7f7;
        color: var(--admin-danger);
      }

      .detail-list {
        display: grid;
      }

      .detail-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        border-bottom: 1px solid #edf0ea;
        padding: 9px 12px;
      }

      .detail-row:last-child {
        border-bottom: 0;
      }

      .detail-row strong {
        color: var(--admin-ink);
        font-size: 13px;
      }

      .detail-row p {
        margin: 3px 0 0;
        color: var(--admin-muted);
        font-size: 12px;
        line-height: 1.3;
      }

      .detail-value {
        max-width: 180px;
        color: var(--admin-ink);
        font-size: 15px;
        font-weight: 950;
        text-align: right;
        overflow-wrap: anywhere;
        font-variant-numeric: tabular-nums;
      }

      .metric-panel.wide .detail-value {
        max-width: 360px;
      }

      .tool-map {
        display: grid;
        gap: 9px;
        padding: 12px;
      }

      .tool-group {
        border: 1px solid var(--admin-line);
        border-radius: 8px;
        background: #f8faf7;
        overflow: hidden;
      }

      .tool-head {
        display: grid;
        gap: 4px;
        background: linear-gradient(135deg, #4fb16f, #327849);
        color: #ffffff;
        padding: 12px;
        text-decoration: none;
      }

      .tool-head:hover {
        background: linear-gradient(135deg, #3f965c, #2a603d);
      }

      .tool-head h4 {
        margin: 0;
        color: #ffffff;
        font-size: 17px;
      }

      .tool-head p {
        margin: 0;
        color: rgba(255, 255, 255, 0.86);
        font-size: 12px;
        line-height: 1.28;
      }

      .tool-list {
        display: grid;
      }

      .tool-link {
        display: grid;
        gap: 3px;
        border-bottom: 1px solid #edf0ea;
        padding: 9px 11px;
        text-decoration: none;
      }

      .tool-link:last-child {
        border-bottom: 0;
      }

      .tool-link:hover {
        background: #fbfdfb;
      }

      .tool-link strong {
        color: var(--admin-ink);
        font-size: 13px;
      }

      .tool-link span {
        display: block;
        color: var(--admin-muted);
        font-size: 12px;
        line-height: 1.28;
      }

      .empty-state {
        border: 1px solid #f8d999;
        border-radius: 8px;
        background: #fffbeb;
        color: #854d0e;
        padding: 13px 14px;
        font-size: 13px;
        font-weight: 850;
      }

      @media (max-width: 980px) {
        .layout,
        .priority-board {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .topbar,
        .surface-head {
          align-items: stretch;
          flex-direction: column;
        }

        .nav {
          width: 100%;
        }

        .kpi-grid,
        .dashboard-grid {
          grid-template-columns: 1fr;
        }

        .metric-panel,
        .metric-panel.wide {
          grid-column: auto;
        }

        .focus-number {
          font-size: 42px;
        }

        .tool-head {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body class="admin-page admin-home">
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <img class="mark" src="/folks-brand-mark.jpg" alt="Folks Team logo" />
          <div>
            <p class="eyebrow">Folks Team</p>
            <h1>Admin</h1>
          </div>
        </div>
        <nav class="nav" aria-label="Admin">
          <a href="/">Xem website</a>
          <a class="secondary" href="/admin/content.html">Sửa trang</a>
          <a class="secondary" href="/admin/blog.html">Viết blog</a>
          <a class="secondary" href="/admin/leads.html">Lead</a>
          <a class="secondary" href="/admin/operations.html">Vận hành</a>
          <button type="button" class="button secondary" data-admin-logout>
            Đăng xuất
          </button>
        </nav>
      </header>

      <div class="layout">
        <aside class="stack" aria-label="Công cụ Admin">
          <section class="surface">
            <div class="surface-head">
              <div>
                <h3>Bản đồ công cụ</h3>
                <p>Chọn theo việc cần làm, không cần nhớ trang nằm ở đâu.</p>
              </div>
            </div>
            <div id="tool-map" class="tool-map"></div>
          </section>
        </aside>

        <div class="stack">
          <section class="surface" aria-labelledby="priority-title">
            <div class="surface-head">
              <div>
                <h3 id="priority-title">Folks Team Chú Ý!</h3>
                <p id="dashboard-status">Đang tải dữ liệu mới nhất...</p>
              </div>
            </div>
            <div id="priority-board" class="priority-board" aria-live="polite">
              <div class="empty-state">Đang tải việc cần chú ý...</div>
            </div>
          </section>

          <section class="surface" aria-labelledby="dashboard-title">
            <div class="surface-head">
              <div>
                <h3 id="dashboard-title">Dashboard vận hành</h3>
              </div>
            </div>
            <div id="dashboard-grid" class="dashboard-grid">
              <div class="empty-state">Đang tải dashboard...</div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="/admin/admin-session.js"></script>
    <script>
      const dashboardStatus = document.getElementById('dashboard-status');
      const priorityBoard = document.getElementById('priority-board');
      const dashboardGrid = document.getElementById('dashboard-grid');
      const toolMap = document.getElementById('tool-map');

      const toolGroups = [
        {
          group: 'Khách hàng',
          purpose: 'Theo dõi người đã để lại thông tin.',
          primaryHref: '/admin/leads.html',
          items: [
            ['Lead', 'Xử lý khách liên hệ.', '/admin/leads.html'],
            ['Email đăng ký', 'Danh sách người muốn nhận tin.', '/admin/operations.html#subscribers'],
          ],
        },
        {
          group: 'Nội dung website',
          purpose: 'Sửa những gì người xem nhìn thấy.',
          primaryHref: '/admin/content.html',
          items: [
            ['Sửa trang', 'Cập nhật chữ, ảnh, khối nội dung.', '/admin/content.html'],
            ['Viết blog', 'Tạo nháp, kiểm tra và đăng bài.', '/admin/blog.html'],
            ['Sửa chữ hàng loạt', 'Tìm và thay một cụm từ.', '/admin/text.html'],
          ],
        },
        {
          group: 'Vận hành & chất lượng',
          purpose: 'Kiểm tra trước khi public.',
          primaryHref: '/admin/operations.html',
          items: [
            ['Duyệt nội dung', 'Các mục đang chờ kiểm tra.', '/admin/operations.html#review'],
            ['Hiển thị Google', 'Tiêu đề, mô tả và alt ảnh.', '/admin/operations.html#seo'],
            ['Thư viện ảnh', 'Tải ảnh và lấy đường dẫn.', '/admin/operations.html#media'],
            ['Lịch sử thao tác', 'Ai đã đổi gì và khi nào.', '/admin/operations.html#audit'],
          ],
        },
        {
          group: 'Kỹ thuật & hỗ trợ',
          purpose: 'Dành cho cấu hình và hướng dẫn.',
          primaryHref: '/admin/console.html',
          items: [
            ['Kỹ thuật', 'Kiểm tra cấu hình và deploy.', '/admin/console.html'],
            ['Hướng dẫn', 'Cách dùng Admin cho người mới.', '/admin/guide.html'],
          ],
        },
      ];

      function escapeHtml(value) {
        return String(value || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function compactDate(value) {
        if (!value) return 'Chưa có';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return date.toLocaleString('vi-VN', {
          dateStyle: 'short',
          timeStyle: 'short',
        });
      }

      function numberText(value) {
        const number = Number(value || 0);
        return Number.isFinite(number) ? number.toLocaleString('vi-VN') : '-';
      }

      function levelClass(level) {
        if (level === 'danger') return 'danger';
        if (level === 'warn') return 'warn';
        return '';
      }

      function detailRow(item) {
        return `
          <div class="detail-row">
            <div>
              <strong>${escapeHtml(item.label)}</strong>
              <p>${escapeHtml(item.note)}</p>
            </div>
            <span class="detail-value">${escapeHtml(item.value)}</span>
          </div>
        `;
      }

      function metricPanel(item) {
        return `
          <article class="metric-panel ${escapeHtml(item.wide ? 'wide' : '')}">
            <div class="metric-main">
              <div class="metric-title">
                <h4>${escapeHtml(item.title)}</h4>
                <span class="pill ${levelClass(item.level)}">${escapeHtml(item.status)}</span>
              </div>
              <div>
                <div class="metric-value">${escapeHtml(item.value)}</div>
                <div class="metric-caption">${escapeHtml(item.caption)}</div>
              </div>
            </div>
            <div class="detail-list">
              ${item.details.map(detailRow).join('')}
            </div>
          </article>
        `;
      }

      function kpiCard(item) {
        return `
          <a class="kpi ${levelClass(item.level)}" href="${escapeHtml(item.href)}">
            <span class="kpi-label">${escapeHtml(item.label)}</span>
            <strong class="kpi-value">${escapeHtml(item.value)}</strong>
            <p class="kpi-note">${escapeHtml(item.note)}</p>
          </a>
        `;
      }

      function priorityBoardMarkup(data) {
        const metrics = data.metrics || {};
        const latest = data.latest || {};
        const urgent = Number(metrics.staleNewLeads || 0);
        const focusClean = urgent ? '' : 'clean';
        return `
          <article class="focus-panel ${focusClean}">
            <div class="focus-top">
              <div>
                <p class="eyebrow">${urgent ? 'Ưu tiên hôm nay' : 'Tình hình hôm nay'}</p>
                <h3>${urgent ? 'Trả lời lead quá hạn' : 'Không có việc quá hạn'}</h3>
              </div>
              <strong class="focus-number">${numberText(urgent)}</strong>
            </div>
            <p class="focus-note">
              ${
                urgent
                  ? 'Lead quá 24 giờ nên được xử lý trước các việc nội dung để tránh mất khách.'
                  : 'Không có lead quá hạn. Có thể kiểm tra nội dung chờ duyệt hoặc cập nhật website.'
              }
            </p>
            <div class="focus-actions">
              <a class="button" href="/admin/leads.html">Mở Lead</a>
              <a class="button secondary" href="/admin/operations.html#review">Mở hàng chờ duyệt</a>
            </div>
          </article>
          <div class="kpi-grid">
            ${[
              {
                label: 'Lead mới',
                value: numberText(metrics.newLeads),
                note: 'khách mới cần phân loại.',
                level: metrics.newLeads ? 'warn' : '',
                href: '/admin/leads.html',
              },
              {
                label: 'Chờ duyệt',
                value: numberText(metrics.pendingReviews),
                note: 'mục cần kiểm tra trước khi đăng.',
                level: metrics.pendingReviews ? 'warn' : '',
                href: '/admin/operations.html#review',
              },
              {
                label: 'Người nhận tin',
                value: numberText(metrics.subscribers),
                note: 'tổng email đăng ký.',
                level: '',
                href: '/admin/operations.html#subscribers',
              },
              {
                label: 'Cập nhật',
                value: compactDate(latest.auditAt || data.updatedAt),
                note: 'lần ghi nhận gần nhất.',
                level: '',
                href: '/admin/operations.html#audit',
              },
            ]
              .map(kpiCard)
              .join('')}
          </div>
        `;
      }

      function dashboardPanels(data) {
        const metrics = data.metrics || {};
        const contentCounts = data.contentCounts || {};
        const latest = data.latest || {};
        const leadStatus = data.leadStatus || {};
        const subscriberStatus = data.subscriberStatus || {};
        return [
          {
            title: 'Khách hàng',
            value: numberText(metrics.newLeads),
            caption: 'lead mới cần nhìn trước',
            status: metrics.staleNewLeads ? 'Ưu tiên' : metrics.newLeads ? 'Cần xem' : 'Ổn',
            level: metrics.staleNewLeads ? 'danger' : metrics.newLeads ? 'warn' : '',
            details: [
              { label: 'Quá 24 giờ', value: numberText(metrics.staleNewLeads), note: 'Nên trả lời trước.' },
              { label: 'Đang xử lý', value: numberText(metrics.workingLeads), note: 'Lead đã có người theo dõi.' },
              { label: 'Tổng lead', value: numberText(metrics.leads), note: `Mới nhất: ${compactDate(latest.leadAt)}.` },
              {
                label: 'Trạng thái khác',
                value: numberText(
                  Object.values(leadStatus).reduce((sum, value) => sum + Number(value || 0), 0) -
                    Number(metrics.newLeads || 0) -
                    Number(metrics.workingLeads || 0)
                ),
                note: 'Đã đóng, đã phân loại hoặc trạng thái riêng.',
              },
            ],
          },
          {
            title: 'Nội dung & chất lượng',
            value: numberText(metrics.contentItems),
            caption: 'mục nội dung chính trên website',
            status: metrics.pendingReviews ? 'Có review' : 'Theo dõi',
            level: metrics.pendingReviews ? 'warn' : '',
            details: [
              { label: 'Blog', value: numberText(contentCounts.blog), note: 'Bài viết đang có.' },
              { label: 'Sản phẩm', value: numberText(contentCounts.products), note: 'Sản phẩm hoặc chương trình.' },
              { label: 'Insight', value: numberText(contentCounts.insights), note: 'Nội dung phân tích.' },
              { label: 'Chờ duyệt', value: numberText(metrics.pendingReviews), note: 'Cần kiểm tra trước khi public.' },
              { label: 'Ảnh website', value: numberText(metrics.mediaItems), note: 'Tài nguyên trong thư viện.' },
            ],
          },
          {
            title: 'Cộng đồng',
            value: numberText(metrics.subscribers),
            caption: 'người đăng ký nhận tin',
            status: 'Theo dõi',
            level: '',
            details: [
              { label: 'Đang hoạt động', value: numberText(subscriberStatus.active || metrics.subscribers), note: 'Active hoặc chưa phân loại.' },
              {
                label: 'Trạng thái khác',
                value: numberText(
                  Object.entries(subscriberStatus)
                    .filter(([key]) => key !== 'active')
                    .reduce((sum, [, value]) => sum + Number(value || 0), 0)
                ),
                note: 'Các trạng thái phụ nếu có.',
              },
            ],
          },
          {
            title: 'Hệ thống & lịch sử',
            value: numberText(metrics.auditEvents),
            caption: 'lần thay đổi đã được ghi lại',
            status: 'Có lịch sử',
            level: '',
            wide: true,
            details: [
              { label: 'Lịch sử mới nhất', value: compactDate(latest.auditAt), note: 'Mốc gần nhất có thao tác admin.' },
              { label: 'Trang admin', value: numberText(contentCounts.adminPages), note: 'Số file công cụ trong khu Admin.' },
              { label: 'Nơi lưu dữ liệu', value: data.repo || 'Chưa rõ', note: 'Repository đang dùng.' },
              { label: 'Nhánh', value: data.branch || 'Chưa rõ', note: 'Nhánh đang đọc và ghi dữ liệu.' },
            ],
          },
        ];
      }

      function toolGroupMarkup(group) {
        return `
          <article class="tool-group">
            <a class="tool-head" href="${escapeHtml(group.primaryHref)}">
              <h4>${escapeHtml(group.group)}</h4>
              <p>${escapeHtml(group.purpose)}</p>
            </a>
            <div class="tool-list">
              ${group.items
                .map(
                  item => `
                    <a class="tool-link" href="${escapeHtml(item[2])}">
                      <strong>${escapeHtml(item[0])}</strong>
                      <span>${escapeHtml(item[1])}</span>
                    </a>
                  `
                )
                .join('')}
            </div>
          </article>
        `;
      }

      async function loadDashboard() {
        dashboardStatus.textContent = 'Đang tải dữ liệu mới nhất...';
        priorityBoard.innerHTML = '<div class="empty-state">Đang tải việc cần chú ý...</div>';
        dashboardGrid.innerHTML = '<div class="empty-state">Đang tải dashboard...</div>';

        try {
          const response = await fetch('/api/admin-operations?module=dashboard', {
            credentials: 'same-origin',
            cache: 'no-store',
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok || data.ok === false) {
            throw new Error(data.message || `Không tải được dashboard (${response.status}).`);
          }

          dashboardStatus.textContent = `Cập nhật: ${compactDate(data.updatedAt)}`;
          priorityBoard.innerHTML = priorityBoardMarkup(data);
          dashboardGrid.innerHTML = dashboardPanels(data).map(metricPanel).join('');
        } catch (error) {
          dashboardStatus.textContent =
            error instanceof Error ? error.message : 'Không tải được dashboard.';
          priorityBoard.innerHTML = `
            <div class="empty-state">
              Không tải được dữ liệu. Hãy đăng nhập lại hoặc mở Vận hành để kiểm tra.
            </div>
          `;
          dashboardGrid.innerHTML = '';
        }
      }

      toolMap.innerHTML = toolGroups.map(toolGroupMarkup).join('');
      loadDashboard();
    </script>
  </body>
</html>
