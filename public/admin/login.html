<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Đăng nhập | Folks Team CMS</title>
    <link rel="icon" type="image/png" href="/admin-favicon.png?v=admin-3" />
    <style>
      :root {
        color-scheme: light;
        --ink: #262626;
        --muted: #5f5f5f;
        --line: #e5e5e5;
        --brand: #4fb16f;
        --brand-dark: #2f7c48;
        --paper: #e8ebe7;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          'Segoe UI', sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 20% 16%, rgb(79 177 111 / 18%), transparent 28%),
          linear-gradient(145deg, #f8faf7 0%, var(--paper) 46%, #dfe3de 100%);
        color: var(--ink);
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 460px);
        border: 1px solid rgb(255 255 255 / 70%);
        border-radius: 16px;
        background: rgb(255 255 255 / 86%);
        padding: 28px;
        box-shadow: 0 24px 80px rgb(38 38 38 / 14%);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: flex;
        gap: 14px;
        align-items: center;
        margin-bottom: 26px;
      }

      .brand img {
        width: 54px;
        height: 54px;
        border-radius: 10px;
        object-fit: cover;
        box-shadow: 0 14px 28px rgb(79 177 111 / 24%);
      }

      .eyebrow {
        margin: 0;
        color: var(--brand-dark);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 2px 0 0;
        font-size: 34px;
        line-height: 1;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.65;
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 7px;
        color: #3f3f3f;
        font-size: 13px;
        font-weight: 800;
      }

      input {
        width: 100%;
        border: 1px solid #d4d4d4;
        border-radius: 10px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-size: 15px;
        padding: 13px 14px;
        outline: none;
      }

      input:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 4px rgb(79 177 111 / 18%);
      }

      button {
        min-height: 46px;
        border: 0;
        border-radius: 999px;
        background: var(--brand);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 900;
        padding: 12px 18px;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .hint,
      .error {
        margin: 0;
        font-size: 13px;
      }

      .error {
        display: none;
        border: 1px solid #fecaca;
        border-radius: 10px;
        background: #fef2f2;
        color: #991b1b;
        padding: 10px 12px;
        font-weight: 800;
      }

      .error.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card" aria-labelledby="title">
        <div class="brand">
          <img src="/folks-brand-mark.jpg" alt="Folks Team logo" />
          <div>
            <p class="eyebrow">Folks Team CMS</p>
            <h1 id="title">Đăng nhập</h1>
          </div>
        </div>
        <p>Đăng nhập để quản lý nội dung website Folks Team.</p>
        <form id="login-form">
          <label>
            Tên đăng nhập
            <input id="username" name="username" autocomplete="username" value="admin" required />
          </label>
          <label>
            Mật khẩu
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              autofocus
              required
            />
          </label>
          <p class="error" id="error-message">Không đăng nhập được.</p>
          <button id="submit-button" type="submit">Đăng nhập</button>
          <p class="hint">Nếu quên mật khẩu, hãy liên hệ người quản trị website.</p>
        </form>
      </section>
    </main>

    <script>
      const form = document.getElementById('login-form');
      const errorMessage = document.getElementById('error-message');
      const submitButton = document.getElementById('submit-button');

      form.addEventListener('submit', async event => {
        event.preventDefault();
        errorMessage.classList.remove('show');
        submitButton.disabled = true;
        submitButton.textContent = 'Đang đăng nhập...';

        try {
          const response = await fetch('/api/admin-auth', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              username: document.getElementById('username').value.trim(),
              password: document.getElementById('password').value,
            }),
          });

          const data = await response.json().catch(() => null);
          if (!response.ok) {
            throw new Error(data?.message || 'Không đăng nhập được.');
          }

          const params = new URLSearchParams(window.location.search);
          const next = params.get('next') || '/admin/';
          window.location.assign(next.startsWith('/admin/') ? next : '/admin/');
        } catch (error) {
          errorMessage.textContent = error.message;
          errorMessage.classList.add('show');
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = 'Đăng nhập';
        }
      });
    </script>
  </body>
</html>
